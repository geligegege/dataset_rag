<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件导入 · 掌柜智库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fb;
            --surface: #fff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-tertiary: #9a9ab0;
            --brand: #4f46e5;
            --brand-light: #eef2ff;
            --brand-hover: #4338ca;
            --ok: #059669;
            --ok-bg: #ecfdf5;
            --bad: #dc2626;
            --bad-bg: #fef2f2;
            --warn: #f59e0b;
            --warn-bg: #fffbeb;
            --info: #3b82f6;
            --info-bg: #eff6ff;
            --border: #eaeaef;
            --border-light: #f0f0f5;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,.08);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 720px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(79,70,229,.3);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .header p {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* ── Upload Zone ── */
        .upload-zone {
            background: var(--surface);
            border: 2px dashed #d4d4e0;
            border-radius: var(--radius);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 20px;
            position: relative;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--brand);
            background: var(--brand-light);
        }

        .upload-zone .icon-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--brand-light);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
            transition: all var(--transition);
        }

        .upload-zone:hover .icon-circle { background: #e0e7ff; transform: scale(1.05); }

        .upload-zone h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .upload-zone span {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .file-input { display: none; }

        /* ── File List ── */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            transition: all var(--transition);
            animation: fadeIn .3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-item:hover { border-color: #d4d4e0; box-shadow: var(--shadow-sm); }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 3px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 0.01em;
            flex-shrink: 0;
        }

        .status-uploading { background: var(--warn-bg); color: var(--warn); }
        .status-processing { background: var(--info-bg); color: var(--info); }
        .status-completed { background: var(--ok-bg); color: var(--ok); }
        .status-error { background: var(--bad-bg); color: var(--bad); }

        /* ── Progress Bar ── */
        .progress-wrapper { margin-top: 8px; }
        .progress-bar-outer {
            width: 100%;
            height: 4px;
            background: #f0f0f5;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-inner {
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease, background-color 0.4s ease;
            background: var(--brand);
        }

        .progress-bar-inner.done { background: var(--ok); }
        .progress-bar-inner.error { background: var(--bad); }

        /* ── Logs ── */
        .log-details {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .log-details summary {
            cursor: pointer;
            user-select: none;
            color: var(--text-tertiary);
            font-weight: 500;
            font-size: 11px;
            list-style: none;
            transition: color var(--transition);
        }

        .log-details summary:hover { color: var(--brand); }
        .log-details summary::-webkit-details-marker { display: none; }

        .log-list {
            margin: 6px 0 0 16px;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .log-list li { line-height: 1.5; font-size: 11px; color: var(--text-secondary); }

        /* ── Empty State ── */
        .empty-files {
            text-align: center;
            padding: 32px;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        @media (max-width: 640px) {
            body { padding: 20px 12px; }
            .upload-zone { padding: 32px 16px; }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="header-icon">📄</div>
            <h1>知识库文件导入</h1>
            <p>支持 PDF、Markdown 格式，拖拽或点击上传</p>
        </div>

        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="icon-circle">☁️</div>
            <h3>点击或拖拽文件到此处</h3>
            <span>支持 .pdf / .md 格式</span>
            <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.md">
        </div>

        <div id="fileList" class="file-list">
            <div class="empty-files">暂无上传文件</div>
        </div>
    </div>

    <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    
    // 模拟后端API地址
    const API_BASE = window.location.origin;

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    function handleFiles(files) {
        Array.from(files).forEach(uploadFile);
    }

    function updateProgressBar(bar, percentage) {
        bar.style.width = percentage + '%';
        bar.classList.remove('done', 'error');
        if (percentage >= 100) {
            bar.classList.add('done');
        }
    }

    async function uploadFile(file) {
        // 移除空状态
        const emptyEl = fileList.querySelector('.empty-files');
        if (emptyEl) emptyEl.remove();

        // 创建文件项UI
        const id = 'file-' + Math.random().toString(36).substr(2, 9);
        const html = `
            <div class="file-item" id="${id}">
                <div class="file-info">
                    <div class="file-name">${file.name}</div>
                    <div class="file-meta">
                        <span>${(file.size / 1024).toFixed(1)} KB</span>
                    </div>
                    <div class="progress-wrapper">
                        <div class="progress-bar-outer">
                            <div class="progress-bar-inner"></div>
                        </div>
                    </div>
                    <details class="log-details">
                        <summary>📋 日志（点击展开）</summary>
                        <ul class="log-list"></ul>
                    </details>
                </div>
                <div class="status-badge status-uploading">上传中…</div>
            </div>
        `;
        fileList.insertAdjacentHTML('afterbegin', html);
        const itemEl = document.getElementById(id);
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressBar = itemEl.querySelector('.progress-bar-inner');
        const logListEl = itemEl.querySelector('.log-list');

        // 构建FormData
        const formData = new FormData();
        formData.append('files', file);

        try {
            // 1. 上传文件
            updateProgressBar(progressBar, 50);

            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Upload failed');
            
            const result = await response.json();
            const taskId = result.task_ids[0];

            // 上传完成，进入处理中
            updateProgressBar(progressBar, 30);
            statusBadge.textContent = '处理中…';
            statusBadge.className = 'status-badge status-processing';

            // 2. 轮询状态
            pollStatus(taskId, itemEl);

        } catch (error) {
            console.error(error);
            statusBadge.textContent = '失败';
            statusBadge.className = 'status-badge status-error';
            progressBar.classList.add('error');
        }
    }

    function normalizeDoneLog(text) {
        // 后端可能返回中文节点名，也可能已拼接“已完成”
        if (typeof text !== 'string') return String(text);
        return text.endsWith('已完成') ? text : `${text}已完成`;
    }

    function normalizeRunningLog(text) {
        // 后端可能返回中文节点名，也可能已拼接“正在进行.../处理中...”
        if (typeof text !== 'string') return String(text);
        if (text.startsWith('正在进行')) return text.endsWith('...') ? text : `${text}...`;
        return `正在进行${text}...`;
    }

    function renderLogs(itemEl, doneList, runningList) {
        const logSummary = itemEl.querySelector('.log-details summary');
        const logListEl = itemEl.querySelector('.log-list');
        const logDetails = itemEl.querySelector('.log-details');

        const done = Array.isArray(doneList) ? doneList : [];
        const running = Array.isArray(runningList) ? runningList : [];

        logSummary.textContent = `📋 日志（已完成 ${done.length}，进行中 ${running.length}）`;

        logListEl.innerHTML = '';
        const lines = [
            ...done.map(normalizeDoneLog),
            ...running.map(normalizeRunningLog),
        ];

        if (lines.length === 0) {
            const li = document.createElement('li');
            li.textContent = '暂无日志';
            logListEl.appendChild(li);
            logDetails.open = false;
        } else {
            for (const line of lines) {
                const li = document.createElement('li');
                li.textContent = line;
                logListEl.appendChild(li);
            }
        }
    }

    function pollStatus(taskId, itemEl) {
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressBar = itemEl.querySelector('.progress-bar-inner');
        
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/status/${taskId}`);
                const data = await res.json();

                // 渲染日志
                renderLogs(itemEl, data.done_list, data.running_list);
                
                if (data.status === 'completed') {
                    statusBadge.textContent = '已完成';
                    statusBadge.className = 'status-badge status-completed';
                    updateProgressBar(progressBar, 100);
                    clearInterval(interval);
                } else if (data.status === 'processing') {
                    statusBadge.textContent = '处理中…';
                    updateProgressBar(progressBar, 30);
                } else if (data.status === 'failed') {
                    statusBadge.textContent = '失败';
                    statusBadge.className = 'status-badge status-error';
                    progressBar.classList.add('error');
                    clearInterval(interval);
                }
            } catch (e) {
                console.error('Polling error', e);
            }
        }, 2000);
    }
    </script>

</body>

</html>
