<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>查询监控 · 掌柜智库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fb;
            --surface: #fff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-tertiary: #9a9ab0;
            --brand: #4f46e5;
            --ok: #059669;
            --ok-bg: #ecfdf5;
            --bad: #dc2626;
            --bad-bg: #fef2f2;
            --run: #4f46e5;
            --run-bg: #eef2ff;
            --border: #eaeaef;
            --border-light: #f0f0f5;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,.06);
            --radius-sm: 10px;
            --radius: 14px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

        /* ── Header ── */
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
        }

        .top-left { display: flex; align-items: center; gap: 14px; }
        .logo-dot {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(79,70,229,.3);
        }
        .title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
        .ctrl { display: flex; gap: 8px; align-items: center; }

        input {
            height: 38px;
            min-width: 260px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 0 14px;
            background: var(--surface);
            color: var(--text);
            font: inherit;
            font-size: 13px;
            outline: none;
            transition: all var(--transition);
        }

        input::placeholder { color: var(--text-tertiary); }
        input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(79,70,229,.08); }

        button {
            height: 38px;
            padding: 0 18px;
            border: none;
            border-radius: 10px;
            background: var(--text);
            color: #fff;
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
        }
        button:hover { background: #2d2d4a; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        /* ── Metric Cards ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover { border-color: #d4d4e0; box-shadow: var(--shadow-md); }

        .card .k {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        .card .v {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .card .v.ok { color: var(--ok); }
        .card .v.bad { color: var(--bad); }
        .card .v.run { color: var(--run); }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 0 0 var(--radius) var(--radius);
        }

        .card.card-ok::after { background: var(--ok); }
        .card.card-bad::after { background: var(--bad); }
        .card.card-run::after { background: var(--run); }

        /* ── Table ── */
        .tbl {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        table { width: 100%; border-collapse: collapse; }

        th, td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-light);
            font-size: 13px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background: #fafbfc;
            color: var(--text-tertiary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        tr:last-child td { border-bottom: 0; }
        tr:hover td { background: #fafbfc; }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .tag.ok { background: var(--ok-bg); color: var(--ok); }
        .tag.bad { background: var(--bad-bg); color: var(--bad); }
        .tag.run { background: var(--run-bg); color: var(--run); }

        .q { max-width: 340px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sid { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }
        .muted { color: var(--text-tertiary); font-size: 12px; }

        .btn-detail {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text-secondary);
            font: inherit;
            font-size: 11px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-detail:hover { border-color: var(--brand); color: var(--brand); background: var(--run-bg); }

        /* ── Detail Panel ── */
        .detail {
            margin-top: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            animation: slideDown .25s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .line { font-size: 13px; line-height: 1.6; }
        .line b { color: var(--text-secondary); font-weight: 600; }
        .mono { font-family: "SF Mono", "Fira Code", "Consolas", monospace; font-size: 12px; }

        @media (max-width: 980px) {
            .cards { grid-template-columns: repeat(3, 1fr); }
            .tbl { overflow-x: auto; }
            table { min-width: 860px; }
        }

        @media (max-width: 640px) {
            .wrap { padding: 16px 12px; }
            .top { flex-direction: column; align-items: stretch; }
            .ctrl { width: 100%; }
            input { min-width: 0; flex: 1; }
            .cards { grid-template-columns: repeat(2, 1fr); }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="top">
            <div class="top-left">
                <div class="logo-dot">监</div>
                <div class="title">查询监控</div>
            </div>
            <div class="ctrl">
                <input id="kw" placeholder="搜索 query 或 session_id…" />
                <button id="btnRefresh">刷新</button>
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <div class="k">总请求</div>
                <div class="v" id="mTotal">0</div>
            </div>
            <div class="card card-ok">
                <div class="k">成功</div>
                <div class="v ok" id="mOk">0</div>
            </div>
            <div class="card card-bad">
                <div class="k">失败</div>
                <div class="v bad" id="mFail">0</div>
            </div>
            <div class="card card-run">
                <div class="k">处理中</div>
                <div class="v run" id="mRun">0</div>
            </div>
            <div class="card">
                <div class="k">成功率</div>
                <div class="v" id="mSr">0%</div>
            </div>
            <div class="card">
                <div class="k">P95 延迟</div>
                <div class="v" id="mP95">0<span style="font-size:14px;font-weight:500;color:var(--text-tertiary);"> ms</span></div>
            </div>
        </div>

        <div class="tbl">
            <table>
                <thead>
                    <tr>
                        <th>状态</th>
                        <th>Session ID</th>
                        <th>问题</th>
                        <th>延迟</th>
                        <th>进度</th>
                        <th>答案长度</th>
                        <th>更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>

        <div class="detail" id="detail" style="display:none;"></div>
    </div>

    <script>
    const API_BASE = `${location.protocol}//${location.host}`;
    const tbody = document.getElementById('tbody');
    const kw = document.getElementById('kw');
    const detail = document.getElementById('detail');
    const fmt = ts => ts ? new Date(ts * 1000).toLocaleString('zh-CN') : '-';
    const esc = s => String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');

    function tag(status){
      if(status === 'completed') return '<span class="tag ok">已完成</span>';
      if(status === 'failed') return '<span class="tag bad">失败</span>';
      return '<span class="tag run">处理中</span>';
    }

    function setSummary(s){
      document.getElementById('mTotal').textContent = s.total ?? 0;
      document.getElementById('mOk').textContent = s.completed ?? 0;
      document.getElementById('mFail').textContent = s.failed ?? 0;
      document.getElementById('mRun').textContent = s.processing ?? 0;
      document.getElementById('mSr').textContent = `${s.success_rate ?? 0}%`;
      document.getElementById('mP95').textContent = s.p95_latency_ms ?? 0;
    }

    async function load(){
      const res = await fetch(`${API_BASE}/query/monitor/recent?limit=200`);
      const data = await res.json();
      setSummary(data.summary || {});
      const k = (kw.value || '').trim().toLowerCase();
      const items = (data.items || []).filter(x => {
        const text = `${x.session_id||''} ${x.query||''}`.toLowerCase();
        return !k || text.includes(k);
      });

      tbody.innerHTML = items.map(x => `
        <tr class="row">
          <td>${tag(x.status)}</td>
          <td class="sid mono" title="${esc(x.session_id)}">${esc(x.session_id)}</td>
          <td class="q" title="${esc(x.query)}">${esc(x.query)}</td>
          <td>${x.latency_ms ?? '-'}</td>
          <td>${x.done_count ?? 0} / ${x.running_count ?? 0}</td>
          <td>${x.answer_len ?? 0}</td>
          <td class="muted">${fmt(x.updated_at)}</td>
          <td><button class="btn-detail" onclick="showDetail('${esc(x.session_id)}')">详情</button></td>
        </tr>
      `).join('');
    }

    async function showDetail(sessionId){
      const res = await fetch(`${API_BASE}/query/monitor/${sessionId}`);
      const d = await res.json();
      detail.style.display = 'block';
      detail.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <h3 style="font-size:15px;font-weight:600;">会话详情</h3>
          <button class="btn-detail" onclick="document.getElementById('detail').style.display='none'" style="font-size:12px;">✕ 关闭</button>
        </div>
        <div class="detail-grid">
          <div class="line"><b>Session ID</b><br><span class="mono">${esc(d.session_id)}</span></div>
          <div class="line"><b>状态</b><br>${tag(d.status)}</div>
          <div class="line"><b>问题</b><br>${esc(d.query || '—')}</div>
          <div class="line"><b>延迟</b><br>${d.latency_ms ?? '—'} ms</div>
          <div class="line"><b>已完成</b><br>${esc((d.done_list || []).join(' · ') || '—')}</div>
          <div class="line"><b>进行中</b><br>${esc((d.running_list || []).join(' · ') || '—')}</div>
        </div>
        ${d.error ? `<div class="line" style="margin-top:10px;color:var(--bad);"><b>错误</b><br>${esc(d.error)}</div>` : ''}
      `;
    }

    document.getElementById('btnRefresh').addEventListener('click', load);
    kw.addEventListener('input', load);
    load();
    setInterval(load, 3000);
    window.showDetail = showDetail;
    </script>
</body>

</html>
