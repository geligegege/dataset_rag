<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>掌柜智库 · 知识库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fb;
            --surface: #ffffff;
            --surface-hover: #f4f5f7;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-tertiary: #9a9ab0;
            --brand: #4f46e5;
            --brand-light: #eef2ff;
            --brand-hover: #4338ca;
            --user-bubble: #4f46e5;
            --bot-bubble: #ffffff;
            --border: #eaeaef;
            --border-light: #f0f0f5;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,.08);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 28px;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            width: 100%;
            max-width: 960px;
            height: min(820px, 90vh);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Top Bar ── */
        .topbar {
            height: 60px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 22px;
            border-bottom: 1px solid var(--border-light);
            background: var(--surface);
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(79,70,229,.3);
        }

        .title strong {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .title span {
            font-size: 11px;
            color: var(--text-tertiary);
            display: block;
            margin-top: 1px;
        }

        .top-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pill {
            height: 30px;
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 0 10px;
            border-radius: 8px;
            background: var(--surface);
            white-space: nowrap;
            transition: all var(--transition);
        }

        .pill.ok { color: #059669; border-color: #d1fae5; background: #f0fdf4; }
        .pill.err { color: #dc2626; border-color: #fee2e2; background: #fef2f2; }

        .btn {
            height: 30px;
            padding: 0 14px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .btn:hover { background: var(--surface-hover); border-color: #d4d4e0; }
        .btn:disabled { opacity: .4; cursor: not-allowed; }

        .stream-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            padding: 0 2px;
        }

        .stream-toggle input[type="checkbox"] {
            accent-color: var(--brand);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        /* ── Chat Area ── */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 22px;
            background: #fafbfc;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat::-webkit-scrollbar { width: 5px; }
        .chat::-webkit-scrollbar-thumb { background: #d4d4e0; border-radius: 10px; }
        .chat::-webkit-scrollbar-track { background: transparent; }

        .dayline {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 11px;
            font-weight: 500;
            padding: 16px 0 8px;
            letter-spacing: 0.02em;
        }

        /* ── Messages ── */
        .msg {
            display: flex;
            gap: 10px;
            margin: 8px 0;
            animation: fadeIn .3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user { justify-content: flex-end; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .avatar.user-av { background: #f0f0f5; color: #6b6b8a; }
        .avatar.bot { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; }

        .bubble {
            max-width: min(680px, 74%);
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.65;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            position: relative;
            transition: box-shadow var(--transition);
        }

        .msg.bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        .msg.user .bubble {
            color: #fff;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(79,70,229,.25);
        }

        .meta {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 5px;
            padding: 0 4px;
        }

        /* ── Progress ── */
        details.progress {
            margin-top: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            background: #fafbfc;
        }

        details.progress summary {
            cursor: pointer;
            user-select: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            list-style: none;
        }

        details.progress summary::-webkit-details-marker { display: none; }

        .progress ul { margin: 8px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .progress li { font-size: 12px; color: var(--text-secondary); }

        /* ── Images ── */
        .answer-images {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .answer-images img {
            display: block;
            max-width: min(100%, 560px);
            max-height: 480px;
            width: auto;
            height: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: #fff;
            object-fit: contain;
        }

        .answer-images a {
            font-size: 11px;
            color: var(--brand);
            text-decoration: none;
            word-break: break-all;
            opacity: .8;
            transition: opacity var(--transition);
        }

        .answer-images a:hover { opacity: 1; }

        /* ── Typing dots ── */
        .typing { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #c4c4d4;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: .15s; }
        .dot:nth-child(3) { animation-delay: .3s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: .4; }
            40% { transform: translateY(-5px); opacity: 1; }
        }

        /* ── Composer ── */
        .composer {
            border-top: 1px solid var(--border-light);
            padding: 14px 18px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--surface);
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            resize: none;
            min-height: 46px;
            max-height: 140px;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            outline: none;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
            background: #fafbfc;
            font-family: inherit;
            transition: all var(--transition);
        }

        textarea::placeholder { color: var(--text-tertiary); }
        textarea:focus {
            border-color: var(--brand);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(79,70,229,.08);
        }

        .send {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: var(--brand);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            transition: all var(--transition);
            box-shadow: 0 2px 8px rgba(79,70,229,.3);
        }

        .send:hover { background: var(--brand-hover); transform: scale(1.04); }
        .send:active { transform: scale(.96); }
        .send:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .send svg { width: 20px; height: 20px; }

        /* ── Empty State ── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            gap: 8px;
            padding: 40px;
        }

        .empty-state .icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--brand-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); }
        .empty-state p { font-size: 13px; }

        @media (max-width: 720px) {
            body { padding: 0; }
            .app { height: 100dvh; max-width: none; border: 0; border-radius: 0; box-shadow: none; }
            .topbar { padding: 0 14px; height: 54px; }
            .chat { padding: 14px; }
            .bubble { max-width: min(100%, 82vw); font-size: 13px; }
            .composer { padding: 10px 12px; }
            textarea { border-radius: 20px; min-height: 42px; }
            .send { width: 42px; height: 42px; }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">
                <div class="logo">智</div>
                <div class="title">
                    <strong>掌柜智库</strong>
                    <span id="subTitle">知识库问答</span>
                </div>
            </div>
            <div class="top-actions">
                <label class="stream-toggle">
                    <input type="checkbox" id="streamToggle" checked> 流式
                </label>
                <span class="pill" id="apiPill">连接中…</span>
                <button class="btn" id="btnClear">清空对话</button>
            </div>
        </div>

        <div class="chat" id="chat">
            <div class="dayline">今天</div>
            <div class="msg bot">
                <div class="avatar bot">智</div>
                <div>
                    <div class="bubble">你好，我是掌柜智库助手。请直接输入你的问题，我会尽力为你解答。</div>
                    <div class="meta">掌柜智库</div>
                </div>
            </div>
        </div>

        <div class="composer">
            <textarea id="input" placeholder="输入你的问题…" rows="1"></textarea>
            <button class="send" id="send" title="发送 (Enter)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script>
    // 默认同源；如你把页面单独打开（file://），可改成 http://127.0.0.1:8001
    const API_BASE = `${location.protocol}//${location.host}`.includes('http') ? `${location.protocol}//${location.host}` : 'http://127.0.0.1:8001';
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const apiPill = document.getElementById('apiPill');
    const btnClear = document.getElementById('btnClear');
    const streamToggle = document.getElementById('streamToggle');

    // Session ID Logic
    let sessionId = localStorage.getItem('kb_session_id');
    if (!sessionId) {
      sessionId = 'sess-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('kb_session_id', sessionId);
    }

    function scrollToBottom(){
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function nowTime(){
      const d = new Date();
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function formatTime(ts){
      if(!ts) return nowTime();
      const d = new Date(Number(ts) * 1000);
      if(Number.isNaN(d.getTime())) return nowTime();
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function isImageUrl(url){
      // 增加宽松度，有些 url 可能后面跟了奇怪的参数
      // 只要包含 .jpg .png 等扩展名，且后面是 ? # 或 结束，或者被某些标点截断前
      // 简单判断：路径部分以图片后缀结尾
      try {
        const u = new URL(url);
        return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(u.pathname);
      } catch (e) {
        // 如果 new URL 失败（比如相对路径或非法字符），退回正则匹配
        return /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(url || '');
      }
    }

    function normalizeUrl(rawUrl){
      const s = String(rawUrl || '').trim();
      if(!s) return '';
      // 尽量保留原始 URL，但把空格编码，避免 img src 失败
      return s.replace(/\s/g, '%20');
    }

    function dedupeKeepOrder(arr){
      const seen = new Set();
      const out = [];
      for(const x of (Array.isArray(arr) ? arr : [])){
        const v = String(x || '');
        if(!v) continue;
        if(seen.has(v)) continue;
        seen.add(v);
        out.push(v);
      }
      return out;
    }

    function extractUrlsLoose(text){
      const s = String(text || '');
      // 简单正则提取：匹配 http/https 开头，直到遇到空白字符
      // [^\s] 包含中文、特殊符号等，直到遇到换行或空格
      const regex = /(https?:\/\/[^\s]+)/g;
      const matches = s.match(regex) || [];
      const urls = [];
      
      // 去除首尾标点
      const trimTailPunct = (u) => String(u || '').replace(/[)\]}'">，。,;；\]】）＞]+$/g, '');
      const trimHeadPunct = (u) => String(u || '').replace(/^[<([{'"]+|^[＜（【\[]+/g, '');

      for(const m of matches){
        let u = trimHeadPunct(trimTailPunct(m));
        // 简单清洗可能混入的结尾
        if(u) urls.push(u);
      }
      return dedupeKeepOrder(urls);
    }

    function parseImagesFromTextLoosely(text){
      const urls = extractUrlsLoose(text).filter(isImageUrl);
      return dedupeKeepOrder(urls);
    }

    function findLastImageMarkerIndex(raw){
      const s = String(raw || '');
      // 支持多种写法：【图片】、【 图片 】、[图片]、[ 图片 ]
      const re = /【\s*图片\s*】|\[\s*图片\s*\]/g;
      let m;
      let lastIdx = -1;
      let lastLen = 0;
      while((m = re.exec(s)) !== null){
        lastIdx = m.index;
        lastLen = m[0].length;
      }
      return { idx: lastIdx, len: lastLen };
    }

    function parseAnswerAndImages(text){
      const raw = String(text || '');
      const { idx, len } = findLastImageMarkerIndex(raw);
      if(idx === -1) return { text: raw, images: [] };

      const before = raw.slice(0, idx).trimEnd();
      const after = raw.slice(idx + len).trim();
      const urls = [];

      // 优先按“每行一个 URL”的方式解析，允许 URL 中包含空格
      const lines = after.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      for(const line of lines){
        if(line.startsWith('http://') || line.startsWith('https://')){
          urls.push(line);
        }else{
          // 兼容同一行包含多个 URL 的情况
          const matches = extractUrlsLoose(line);
          for(const u of matches){
            urls.push(u);
          }
        }
      }

      // 去重保序 + 过滤图片链接
      const seen = new Set();
      const images = [];
      for(const u of urls){
        const normalized = normalizeUrl(u);
        if(!isImageUrl(normalized)) continue;
        if(seen.has(normalized)) continue;
        seen.add(normalized);
        images.push(normalized);
      }
      return { text: before, images };
    }

    function shouldShowImagesByAnswer(answerText){
      const t = String(answerText || '');
      // 常见“需要看图/见图/如下图”的表述
      const keywords = [
        '如图', '如下图', '见图', '见下图', '下图', '上图',
        '图片', '示意图', '结构图', '外观', '接线图', '电路图', '原理图', '安装图', '尺寸图', '截图'
      ];
      return keywords.some(k => t.includes(k));
    }

    function renderAnswerWithImages(containerEl, answerText, candidateImageUrls){
      const { text, images: imagesFromBlock } = parseAnswerAndImages(answerText);
      const candidates = Array.isArray(candidateImageUrls)
        ? candidateImageUrls.map(normalizeUrl).filter(isImageUrl)
        : [];
      const hasBlockImages = imagesFromBlock && imagesFromBlock.length > 0;
      
      // 使用宽松提取
      const looseImages = extractUrlsLoose(answerText).map(normalizeUrl).filter(isImageUrl);
      
      // 只要后端给了候选图片，就展示（避免答案没写“如图”但用户仍需要看图）
      // 或者从文本里提取到了图片 URL
      const shouldShow = hasBlockImages || (candidates.length > 0) || (looseImages.length > 0);
      
      // 优先级：Block 显式标记 > 后端候选 > 文本宽松提取
      // 注意：这里做个并集可能更好，防止漏掉
      const allImages = new Set([
          ...(hasBlockImages ? imagesFromBlock : []),
          ...candidates,
          ...looseImages
      ]);
      const images = Array.from(allImages);

      containerEl.textContent = '';

      if((text || '').trim().length > 0){
        const textEl = document.createElement('div');
        textEl.className = 'answer-text';
        textEl.textContent = text;
        containerEl.appendChild(textEl);
      }else{
        const textEl = document.createElement('div');
        textEl.className = 'answer-text';
        textEl.textContent = '（已完成，但未返回答案）';
        containerEl.appendChild(textEl);
      }

      if(images && images.length > 0){
        const imgWrap = document.createElement('div');
        imgWrap.className = 'answer-images';
        for(const url of images){
          const safeUrl = normalizeUrl(url);
          const img = document.createElement('img');
          img.loading = 'lazy';
          img.src = safeUrl;
          img.alt = '参考图片';
          img.referrerPolicy = 'no-referrer';
          img.addEventListener('error', () => {
            img.style.display = 'none';
          });
          imgWrap.appendChild(img);

          const link = document.createElement('a');
          link.href = safeUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = url;
          imgWrap.appendChild(link);
        }
        containerEl.appendChild(imgWrap);
      }
    }

    function addUserMsg(text){
      const html = `
        <div class="msg user">
          <div>
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="meta">${nowTime()}</div>
          </div>
          <div class="avatar">我</div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function addUserMsgWithTime(text, ts){
      const html = `
        <div class="msg user">
          <div>
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="meta">${formatTime(ts)}</div>
          </div>
          <div class="avatar">我</div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function addBotMsgWithTime(text, ts, imageUrls){
      const id = 'bot-his-' + Math.random().toString(36).slice(2);
      const html = `
        <div class="msg bot" id="${id}">
          <div class="avatar bot">智</div>
          <div>
            <div class="bubble"><div class="answer"></div></div>
            <div class="meta">${formatTime(ts)}</div>
          </div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      const el = document.getElementById(id);
      if(el){
        const answerEl = el.querySelector('.answer');
        renderAnswerWithImages(answerEl, text || '', imageUrls || []);
      }
      scrollToBottom();
    }

    function addBotMsgSkeleton(){
      const id = 'bot-' + Math.random().toString(36).slice(2);
      const html = `
        <div class="msg bot" id="${id}">
          <div class="avatar bot">智</div>
          <div style="min-width: 180px;">
            <div class="bubble">
              <span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
              <details class="progress" open>
                <summary>阶段进度（等待中）</summary>
                <ul></ul>
              </details>
            </div>
            <div class="meta">${nowTime()}</div>
          </div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
      return document.getElementById(id);
    }

    function renderProgress(botMsgEl, doneList, runningList, status){
      const details = botMsgEl.querySelector('details.progress');
      const summary = details.querySelector('summary');
      const ul = details.querySelector('ul');
      const done = Array.isArray(doneList) ? doneList : [];
      const running = Array.isArray(runningList) ? runningList : [];
      const totalDone = done.length;
      const totalRun = running.length;

      const statusMap = {
        'processing': '处理中',
        'completed': '已完成',
        'failed': '失败',
        'pending': '等待中',
      };
      const displayStatus = statusMap[status] || status || 'unknown';

      summary.textContent = `阶段进度（已完成${totalDone}，进行中${totalRun}，状态：${displayStatus}）`;

      const lines = [
        ...done.map(x => `✅ ${x}`),
        ...running.map(x => `⏳ ${x}`)
      ];
      ul.innerHTML = '';
      if(lines.length === 0){
        ul.insertAdjacentHTML('beforeend', '<li>暂无进度</li>');
      }else{
        for(const line of lines){
          ul.insertAdjacentHTML('beforeend', `<li>${escapeHtml(line)}</li>`);
        }
      }
    }

    function finalizeBotAnswer(botMsgEl, answer, error, imageUrls){
      const bubble = botMsgEl.querySelector('.bubble');
      const progress = botMsgEl.querySelector('details.progress');
      const err = (error || '').trim();

      if(err){
        const progressEl = progress ? progress : null;
        if(progressEl) {
            progressEl.remove();
            progressEl.removeAttribute('open');
        }
        bubble.textContent = '';
        const errEl = document.createElement('div');
        errEl.className = 'answer';
        errEl.textContent = `抱歉，本次处理失败：\n${err}`;
        bubble.appendChild(errEl);
        if(progressEl) bubble.appendChild(progressEl);
        return;
      }

      const progressEl = progress ? progress : null;
      if(progressEl) {
        progressEl.remove();
        progressEl.removeAttribute('open'); // 完成后自动收起
      }
      bubble.textContent = '';
      const answerEl = document.createElement('div');
      answerEl.className = 'answer';
      bubble.appendChild(answerEl);
      renderAnswerWithImages(answerEl, answer || '', imageUrls || []);
      if(progressEl) bubble.appendChild(progressEl);
    }

    async function apiHealth(){
      try{
        const res = await fetch(`${API_BASE}/health`);
        if(!res.ok) throw new Error('health not ok');
        apiPill.textContent = '已连接';
        apiPill.className = 'pill ok';
      }catch(e){
        apiPill.textContent = '未连接';
        apiPill.className = 'pill err';
      }
    }

    async function loadHistory(){
      try{
        const res = await fetch(`${API_BASE}/history/${sessionId}`);
        if(!res.ok) return;
        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];
        if(items.length === 0) return;
        // 保留首条欢迎消息，其余先清空再渲染历史
        const nodes = Array.from(chatEl.querySelectorAll('.msg'));
        for(let i=1;i<nodes.length;i++) nodes[i].remove();
        for(const item of items){
          if(item.role === 'user'){
            addUserMsgWithTime(item.text || '', item.ts);
          }else{
            addBotMsgWithTime(item.text || '', item.ts, item.image_urls || []);
          }
        }
        scrollToBottom();
      }catch(_){}
    }

    async function submitQuery(text){
      const isStream = streamToggle.checked;
      const res = await fetch(`${API_BASE}/query`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          query: text,
          session_id: sessionId,
          is_stream: isStream
        })
      });
      if(!res.ok){
        const msg = await res.text();
        throw new Error(msg || '请求失败');
      }
      return await res.json();
    }

    async function poll(taskId, botMsgEl){
      const typing = botMsgEl.querySelector('.typing');
      const interval = setInterval(async () => {
        try{
          const res = await fetch(`${API_BASE}/status/${taskId}`);
          const data = await res.json();
          renderProgress(botMsgEl, data.done_list, data.running_list, data.status);

          if(data.status === 'completed'){
            if(typing) typing.remove();
            finalizeBotAnswer(botMsgEl, data.answer, data.error, data.image_urls || []);
            clearInterval(interval);
            sendBtn.disabled = false;
          }else if(data.status === 'failed'){
            if(typing) typing.remove();
            finalizeBotAnswer(botMsgEl, data.answer, data.error || 'failed', data.image_urls || []);
            clearInterval(interval);
            sendBtn.disabled = false;
          }
        }catch(e){
          // 轮询错误不立刻终止，让用户稍后重试
        }
      }, 1200);
    }

    async function onSend(){
      console.log('[perf] A onSend start', performance.now());
      const text = (inputEl.value || '').trim();
      if(!text) return;
      inputEl.value = '';
      addUserMsg(text);
      const botMsgEl = addBotMsgSkeleton();
      sendBtn.disabled = true;

      try{
        const isStream = streamToggle.checked;
        console.log('[perf] B submitQuery start', performance.now(), { isStream });
        const data = await submitQuery(text);
        console.log('[perf] B submitQuery end', performance.now(), data);
        
        // 渲染初始状态
        renderProgress(botMsgEl, [], [], 'pending');

        if (!isStream) {
          // 非流式：直接拿到结果
          // data: { session_id, answer, done_list, error, message }
          renderProgress(botMsgEl, data.done_list || [], [], 'completed');
          finalizeBotAnswer(botMsgEl, data.answer, data.error, data.image_urls || []);
          sendBtn.disabled = false;
          return;
        }

        // 流式：SSE
        const { session_id } = data; // 此时 backend 返回 session_id
        
        const bubble = botMsgEl.querySelector('.bubble');
        let answerEl = bubble.querySelector('.answer');
        if(!answerEl){
          answerEl = document.createElement('div');
          answerEl.className = 'answer';
          bubble.insertBefore(answerEl, bubble.firstChild);
        }

        const es = new EventSource(`${API_BASE}/stream/${session_id}`);
        console.log('[perf] C EventSource created', performance.now(), { session_id });
        let rawAnswerText = '';

        es.addEventListener('progress', (e) => {
          try{
            const d = JSON.parse(e.data || '{}');
            renderProgress(botMsgEl, d.done_list, d.running_list, d.status);
            // 当进度状态已完成时，提前结束“...”等待态
            if(d && d.status === 'completed'){
              const typing = botMsgEl.querySelector('.typing');
              if(typing) typing.remove();
              // 防止后端未发送 final 导致按钮一直禁用
              sendBtn.disabled = false;
            }
          }catch(_){}
        });

        es.addEventListener('delta', (e) => {
          try{
            const d = JSON.parse(e.data || '{}');
            const delta = d.delta || '';
            if(delta){
              rawAnswerText += delta;
              // 即使后端未发送 final，也尽可能在流式过程中渲染图片
              renderAnswerWithImages(answerEl, rawAnswerText, []);
              scrollToBottom();
            }
          }catch(_){}
        });

        es.addEventListener('final', (e) => {
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          // 收起进度条
          const progress = botMsgEl.querySelector('details.progress');
          if(progress) progress.removeAttribute('open');
          
          try{
            const d = JSON.parse(e.data || '{}');
            // 流式 delta 可能不包含“【图片】/图片列表”，最终包的 d.answer 才是完整答案；优先使用 d.answer
            const finalText = (d && typeof d.answer === 'string' && d.answer.trim().length > 0) ? d.answer : (rawAnswerText || answerEl.textContent || '');
            renderAnswerWithImages(answerEl, finalText, d.image_urls || []);
          }catch(_){}
          es.close();
          sendBtn.disabled = false;
        });

        es.addEventListener('final_answer', (e) => {
           // 响应用户的 final_answer 信号，确保图片渲染
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          const progress = botMsgEl.querySelector('details.progress');
          if(progress) progress.removeAttribute('open');
          
          try{
            const d = JSON.parse(e.data || '{}');
            const finalText = (d && typeof d.answer === 'string' && d.answer.trim().length > 0) ? d.answer : (rawAnswerText || answerEl.textContent || '');
            renderAnswerWithImages(answerEl, finalText, d.image_urls || []);
          }catch(_){}
          es.close();
          sendBtn.disabled = false;
        });

        es.addEventListener('error', (e) => {
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          // 收起进度条
          const progress = botMsgEl.querySelector('details.progress');
          if(progress) progress.removeAttribute('open');

          try{
            const msg = e && e.data ? (JSON.parse(e.data).error || 'SSE 连接中断/失败') : 'SSE 连接中断/失败';
            rawAnswerText += `\n\n（错误：${msg}）`;
            renderAnswerWithImages(answerEl, rawAnswerText, []);
          }catch(_){
            rawAnswerText += `\n\n（错误：SSE 连接中断/失败）`;
            renderAnswerWithImages(answerEl, rawAnswerText, []);
          }
          es.close();
          sendBtn.disabled = false;
        });
      }catch(e){
        const bubble = botMsgEl.querySelector('.bubble');
        const progress = botMsgEl.querySelector('details.progress');
        const typing = botMsgEl.querySelector('.typing');
        if(typing) typing.remove();
        bubble.innerHTML = `请求失败：${escapeHtml(e.message || e)}\n\n` + progress.outerHTML;
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', onSend);
    inputEl.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        onSend();
      }
    });
    btnClear.addEventListener('click', async () => {
      if(!confirm('确定要清空当前会话的历史记录吗？这将无法恢复。')) return;

      try {
        const res = await fetch(`${API_BASE}/history/${sessionId}`, { method: 'DELETE' });
        if(!res.ok) {
           console.error("Failed to clear history backend, status:", res.status);
           alert('服务端清空失败，仅清空本地显示');
        }
      } catch(e) {
        console.error("Failed to clear history backend", e);
        alert('服务端清空失败，仅清空本地显示');
      }

      // 清空除首条欢迎消息外的内容
      const nodes = Array.from(chatEl.querySelectorAll('.msg'));
      for(let i=1;i<nodes.length;i++) nodes[i].remove();
      scrollToBottom();
    });

    apiHealth();
    setInterval(apiHealth, 5000);
    loadHistory();
    setTimeout(() => inputEl.focus(), 200);
    </script>
</body>

</html>
