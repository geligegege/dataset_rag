<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE 步骤 2 · 任务推送</title>
    <style>
        :root {
            --bg: #f8f9fb;
            --surface: #fff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-tertiary: #9a9ab0;
            --brand: #4f46e5;
            --brand-hover: #4338ca;
            --border: #eaeaef;
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 100%;
            max-width: 680px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,.06);
        }

        .card h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .card .sub {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }

        input {
            flex: 1;
            height: 38px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0 14px;
            font: inherit;
            font-size: 13px;
            outline: none;
            transition: all var(--transition);
            color: var(--text);
        }

        input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(79,70,229,.08); }

        button {
            height: 38px;
            padding: 0 18px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--text);
            color: #fff;
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }

        button:hover { background: #2d2d4a; }
        button:disabled { opacity: .4; cursor: not-allowed; }

        #result {
            background: #fafbfc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            min-height: 120px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 13px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-all;
        }

        #result:empty::after {
            content: '提交任务后，结果将在此显示…';
            color: var(--text-tertiary);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .status.idle { background: #f0f0f5; color: #6b6b8a; }
        .status.streaming { background: #eef2ff; color: #4f46e5; }
        .status.done { background: #ecfdf5; color: #059669; }
    </style>
</head>

<body>
    <div class="card">
        <h3>📡 任务提交 + SSE 结果推送</h3>
        <p class="sub">提交异步任务，通过 SSE 实时接收处理结果</p>
        <div class="controls">
            <input type="text" id="sessionIdInput" placeholder="输入会话 ID…" value="test001">
            <button id="btnSubmit" onclick="submitTask()">提交任务</button>
        </div>
        <div class="status idle" id="status">⏳ 等待提交</div>
        <div id="result"></div>
    </div>

    <script>
        let eventSource = null;
        const resultDom = document.getElementById("result");
        const statusEl = document.getElementById("status");
        const btnSubmit = document.getElementById("btnSubmit");

        async function submitTask() {
            const sessionId = document.getElementById("sessionIdInput").value.trim();
            if (!sessionId) return;

            resultDom.innerHTML = "";
            statusEl.className = 'status streaming';
            statusEl.innerHTML = '🔄 处理中…';
            btnSubmit.disabled = true;

            try {
                await fetch(`http://127.0.0.1:8001/submit/${sessionId}`);

                if (eventSource) eventSource.close();

                eventSource = new EventSource(`http://127.0.0.1:8001/stream/${sessionId}`);
                eventSource.onmessage = function (event) {
                    resultDom.innerHTML += event.data + "\n";
                };

                eventSource.onerror = function () {
                    statusEl.className = 'status done';
                    statusEl.innerHTML = '✅ 连接关闭';
                    btnSubmit.disabled = false;
                };
            } catch (e) {
                resultDom.innerHTML = '提交失败: ' + e.message;
                statusEl.className = 'status idle';
                statusEl.innerHTML = '⚠️ 提交失败';
                btnSubmit.disabled = false;
            }
        }
    </script>
</body>

</html>
